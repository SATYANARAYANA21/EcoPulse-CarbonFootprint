name: EcoPulse CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  frontend-build:
    name: Frontend — Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: TypeScript Type Check
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build

  backend-check:
    name: Backend — Install & Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install fastapi==0.111.0 uvicorn[standard]==0.29.0 \
            pydantic>=2.7.0 pydantic-settings>=2.2.1 slowapi==0.1.9 \
            httpx==0.27.0 python-multipart==0.0.9 google-generativeai>=0.5.4

      - name: Python Syntax Check
        working-directory: ./backend
        run: |
          python -m py_compile app/main.py
          python -m py_compile app/core/config.py
          python -m py_compile app/services/gemini_service.py
          python -m py_compile app/services/firestore_service.py
          python -m py_compile app/routes/calculate.py
          python -m py_compile app/routes/insights.py
          python -m py_compile app/routes/entries.py
          echo "✅ All Python files passed syntax check"

      - name: Check API Entry Point
        run: |
          python -m py_compile api/index.py
          echo "✅ api/index.py passed syntax check"
